spring.application.name=logitrack-api
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sistema_logistica}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

app.security.jwt.secret=${JWT_SECRET:logitrack-development-secret-change-me-with-at-least-32-chars}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
