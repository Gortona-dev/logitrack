services:
  - type: web
    name: logitrack-api
    runtime: docker
    rootDir: logitrack-api
    plan: free
    healthCheckPath: /swagger-ui.html
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
