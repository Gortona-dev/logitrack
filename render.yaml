services:
  - type: web
    name: logitrack-api
    runtime: docker
    rootDir: logitrack-api
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: logitrack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: logitrack-db
    databaseName: logitrack
    user: logitrack
    plan: free
    region: oregon
    postgresMajorVersion: "18"
